version: '3.8'

services:

  order-service:
    build: ./order-service
    ports:
      - "8081:8081"
    depends_on:
      - mongo

  payment-service:
    build: ./payment-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"