spring:
  application:
    name: payment-service

  profiles:
    active: docker

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
  error:
    include-message: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /payment-swagger-ui.html
    enabled: true
    doc-expansion: list
    operations-sorter: alpha
